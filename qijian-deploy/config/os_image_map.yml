# OS 别名 → 镜像（按区） → dl_v2.sh 菜单输入 映射
#
# 工作流：
#   用户给"操作系统版本"（如 "kylin V10 SP3 x86"）
#   → aliases 匹配到某个 OS key
#   → 按 region 选 ImageId（默认 cn-beijing）
#   → dl_v2_menu 提供阶段 3 的前 3 行输入
#   → 合并 dl_v2_input_template 生成完整 10 行输入序列
#
# 注意：
#   - 架构菜单 1/2 基于 2026-04-16 实测（kylin V10 SP3 x86 用 3→1→2），推断 2=x86 / 1=arm；首次跑新 OS 需在 node1 手工确认
#   - CentOS 7.9 自定义镜像都是已特化业务镜像，跑麒舰栈建议选公共镜像或重装
#   - 镜像清单最后一次同步时间：2026-04-16（aliyun ecs DescribeImages --ImageOwnerAlias self）

default_region: cn-beijing
default_os: kylin_v10_sp3_x86

# 完整 dl_v2.sh 交互输入序列构造规则：
# line 1-3  ← dl_v2_menu（各 OS 独立）
# line 4    ← base_select
# line 5    ← script_select
# line 6    ← web_ver（空行）
# line 7-9  ← account / password / project
# line 10   ← web_app_select（应对 ini 含 '-' 触发的子菜单）
dl_v2_input_template:
  base_select: 2       # 2 = 含 env/repo
  script_select: 1     # 1 = 麒舰微服务 v14-standard
  web_ver: ""          # 空 = release720（默认）
  account: majianquan
  password: Egova@123
  project: faq
  web_app_select: 0    # 0 = 全选（[dataflow-毕升采集] 含 '-' 会触发菜单）

# OS 定义
